<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Hurairah AI — Premium Control Center</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg-dark: #09090e;
      --panel-bg: #11111a;
      --sidebar-bg: #161622;
      --accent-purple: #7c3aed;
      --accent-blue: #4f46e5;
      --glass-border: rgba(124, 58, 237, 0.2);
      --text-main: #f1f1f7;
      --text-muted: #94a3b8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; }

    body {
      background: var(--bg-dark);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
      padding: 16px 20px;
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      letter-spacing: 1px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-title { flex: 1; text-align: center; font-weight: 800; }
    
    .logout-btn {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    .logout-btn:hover { background: rgba(255, 255, 255, 0.2); }

    .main { display: flex; flex: 1; overflow: hidden; }

    .user-list {
      width: 320px;
      min-width: 320px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--glass-border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .search-wrapper {
      padding: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .search-input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid var(--glass-border);
      background: rgba(0, 0, 0, 0.2);
      color: white;
      outline: none;
      font-size: 14px;
    }

    .user-list-header {
      padding: 14px 16px;
      font-size: 12px;
      color: #a78bfa;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
    }

    .user-card {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-card:hover { background: rgba(124, 58, 237, 0.1); }
    .user-card.active { background: rgba(124, 58, 237, 0.25); border-left: 4px solid #a78bfa; }

    .user-avatar {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      flex-shrink: 0;
      box-shadow: 0 4px 10px rgba(124, 58, 237, 0.3);
    }

    .user-info { flex: 1; overflow: hidden; }
    .user-name { font-size: 15px; font-weight: 600; color: white; margin-bottom: 4px; }
    .user-last-msg { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .user-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }
    .user-count { background: #7c3aed; color: white; font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 700; }
    
    .delete-btn {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .delete-btn:hover { background: rgba(239, 68, 68, 0.3); color: #ffffff; }

    .chat-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--panel-bg); }
    
    .chat-header {
      padding: 16px 20px;
      background: var(--sidebar-bg);
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-header-avatar {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
    }

    .chat-header-name { font-size: 16px; font-weight: 600; color: white; }
    .chat-header-msgs { font-size: 12px; color: var(--text-muted); }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .chat-messages::-webkit-scrollbar { width: 5px; }
    .chat-messages::-webkit-scrollbar-thumb { background: rgba(124, 58, 237, 0.3); border-radius: 10px; }

    .msg-row { display: flex; flex-direction: column; gap: 4px; max-width: 75%; }
    .msg-row.user-side { align-self: flex-end; }
    .msg-row.bot-side { align-self: flex-start; }

    .msg-time { font-size: 11px; color: #4b5563; margin-bottom: 2px; display: block; width: 100%; text-align: center; margin-top: 10px; }

    .msg-user-bubble {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      padding: 12px 16px;
      border-radius: 16px 16px 4px 16px;
      font-size: 14.5px;
      line-height: 1.5;
      color: white;
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.15);
    }

    .msg-bot-bubble {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 12px 16px;
      border-radius: 16px 16px 16px 4px;
      font-size: 14.5px;
      line-height: 1.5;
      color: #e2e8f0;
    }

    .msg-label { font-size: 11px; color: var(--text-muted); font-weight: 600; margin-bottom: 2px; margin-left: 4px;}
    .msg-row.user-side .msg-label { text-align: right; margin-right: 4px; }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #475569;
      gap: 12px;
    }
    .empty-state i { font-size: 54px; color: rgba(124, 58, 237, 0.3); }
    .empty-state p { font-size: 15px; color: var(--text-muted); }

    .denied { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 700; color: #ef4444; background: #09090e; }
    .loading { flex: 1; display: flex; align-items: center; justify-content: center; color: #a78bfa; font-size: 16px; gap: 10px; }

    @media(max-width: 768px) {
      .user-list { width: 100%; min-width: unset; }
      .chat-view { display: none; }
      .chat-view.mobile-show {
        display: flex;
        position: fixed;
        inset: 0;
        z-index: 999;
        background: var(--panel-bg);
      }
      .back-btn {
        display: flex !important;
        align-items: center;
        background: none;
        border: none;
        color: #a78bfa;
        font-size: 16px;
        cursor: pointer;
        margin-right: 8px;
      }
    }

    .back-btn { display: none; }
  </style>
</head>
<body>

<div class="header">
  <div style="width: 70px;"></div>
  <div class="header-title"><i class="fa-solid fa-shield-halved"></i> Hurairah AI Control Center</div>
  <button class="logout-btn" onclick="logout()"><i class="fa-solid fa-lock"></i> Logout</button>
</div>

<div class="main" id="main">
  <div class="loading"><i class="fa-solid fa-circle-notch fa-spin"></i> Loading panel setup...</div>
</div>

<script>
  const API = "https://hurairah-ai.annu8857818.workers.dev";
  const pass = prompt("Admin Password:");

  if (pass !== "Hurairah786") {
    document.getElementById("main").innerHTML = `<div class="denied"><i class="fa-solid fa-circle-xmark"></i> Access Denied</div>`;
  } else {
    loadData();
  }

  let allChats = [];
  let activeUser = null;

  function formatTime(raw) {
    if (!raw) return "";
    const fixed = raw.includes("T") ? raw : raw.replace(" ", "T");
    const date = new Date(fixed + "Z");
    if (isNaN(date)) return raw;
    return date.toLocaleString('en-IN', {
      year: 'numeric',
      month: 'short',
      day: 'numeric',
      hour: '2-digit',
      minute: '2-digit',
      hour12: true,
      timeZone: 'Asia/Kolkata'
    });
  }

  function loadData() {
    document.getElementById("main").innerHTML = `<div class="loading"><i class="fa-solid fa-spinner fa-spin"></i> Loading all chats...</div>`;
    fetch(API + "/admin", {
      headers: { "x-admin-password": pass }
    })
    .then(r => r.json())
    .then(data => {
      allChats = data;
      renderPanel();
    })
    .catch(err => {
      document.getElementById("main").innerHTML = `<div class="denied"><i class="fa-solid fa-triangle-exclamation"></i> Error: ${err.message}</div>`;
    });
  }

  function renderPanel() {
    const grouped = {};
    allChats.forEach(chat => {
      if (!grouped[chat.username]) grouped[chat.username] = [];
      grouped[chat.username].push(chat);
    });

    const users = Object.keys(grouped);

    document.getElementById("main").innerHTML = `
      <div class="user-list" id="userList">
        <div class="search-wrapper">
          <input type="text" id="userSearch" class="search-input" placeholder="Search user profile..." oninput="filterUsers()">
        </div>
        <div class="user-list-header">
          <span>👥 Active Profiles</span>
          <span style="color:var(--text-muted)">Total: ${users.length}</span>
        </div>
        <div id="usersContainer">
          ${users.map(username => {
            const chats = grouped[username];
            const last = chats[chats.length - 1];
            const initial = username.charAt(0).toUpperCase();
            return `
              <div class="user-card" id="card-${username}" onclick="showChat('${username}')" data-username="${username.toLowerCase()}">
                <div class="user-avatar">${initial}</div>
                <div class="user-info">
                  <div class="user-name">${username}</div>
                  <div class="user-last-msg">${last.user_message}</div>
                </div>
                <div class="user-meta">
                  <span class="user-count">${chats.length}</span>
                  <button class="delete-btn" onclick="deleteUser(event, '${username}')"><i class="fa-solid fa-trash"></i></button>
                </div>
              </div>
            `;
          }).join("")}
        </div>
      </div>
      <div class="chat-view" id="chatView">
        <div class="empty-state">
          <i class="fa-solid fa-comments"></i>
          <p>Select a user to review historical conversations</p>
        </div>
      </div>
    `;

    if (activeUser) showChat(activeUser);
  }

  function filterUsers() {
    const query = document.getElementById("userSearch").value.toLowerCase();
    const cards = document.querySelectorAll(".user-card");
    cards.forEach(card => {
      const name = card.getAttribute("data-username");
      card.style.display = name.includes(query) ? "flex" : "none";
    });
  }

  function showChat(username) {
    activeUser = username;

    document.querySelectorAll(".user-card").forEach(c => c.classList.remove("active"));
    const card = document.getElementById("card-" + username);
    if (card) card.classList.add("active");

    const grouped = {};
    allChats.forEach(chat => {
      if (!grouped[chat.username]) grouped[chat.username] = [];
      grouped[chat.username].push(chat);
    });

    const chats = grouped[username] || [];
    const initial = username.charAt(0).toUpperCase();

    const chatView = document.getElementById("chatView");
    chatView.classList.add("mobile-show");

    chatView.innerHTML = `
      <div class="chat-header">
        <button class="back-btn" onclick="goBack()"><i class="fa-solid fa-arrow-left"></i></button>
        <div class="chat-header-avatar">${initial}</div>
        <div>
          <div class="chat-header-name">${username}</div>
          <div class="chat-header-msgs">${chats.length} messages trace found</div>
        </div>
      </div>
      <div class="chat-messages" id="chatMessages">
        ${chats.slice().map(chat => `
          <div class="msg-time"><i class="fa-regular fa-clock"></i> ${chat.created_at ? formatTime(chat.created_at) : "N/A"}</div>
          <div class="msg-row user-side">
            <div class="msg-label"><i class="fa-regular fa-user"></i> ${username}</div>
            <div class="msg-user-bubble">${chat.user_message}</div>
          </div>
          <div class="msg-row bot-side">
            <div class="msg-label"><i class="fa-solid fa-robot"></i> Hurairah AI</div>
            <div class="msg-bot-bubble">${chat.ai_reply}</div>
          </div>
        `).join("")}
      </div>
    `;

    const msgs = document.getElementById("chatMessages");
    if (msgs) msgs.scrollTop = msgs.scrollHeight;
  }

  function goBack() {
    const chatView = document.getElementById("chatView");
    chatView.classList.remove("mobile-show");
    activeUser = null;
  }

  function deleteUser(event, username) {
    event.stopPropagation();
    if (!confirm(`"${username}" ki poori chat memory permanently wipe out karna chahte ho?`)) return;

    fetch(`${API}?username=${encodeURIComponent(username)}`, {
      method: "DELETE",
      headers: { "x-admin-password": pass }
    })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        allChats = allChats.filter(c => c.username !== username);
        if (activeUser === username) activeUser = null;
        renderPanel();
      }
    })
    .catch(err => alert("Error deleting user: " + err.message));
  }

  function logout() {
    location.reload();
  }
</script>
</body>
</html>
