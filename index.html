<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hurairah AI</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <div class="topbar">
        <div class="brand">
            ✨ Hurairah AI
        </div>
    </div>

    <div id="chatBox" class="chat-box">

        <div class="welcome-screen">

            <div class="online-badge">
                🟢 Online
            </div>

            <div class="logo-wrap">
                <img src="logo.png" alt="MEHU Logo">
            </div>

            <h1>Hello! 👋</h1>

            <h2>I'm Hurairah AI</h2>

            <p>
                How can I help you today?
            </p>

        </div>

    </div>

    <div class="input-area">

        <button class="icon-btn" id="attachBtn">
            📎
        </button>
<input type="file" id="imageInput" accept="image/*" hidden>
        <textarea
            id="messageInput"
            placeholder="Message Hurairah AI..."
            rows="1"></textarea>

        <button id="sendBtn">
            ➤
        </button>

        <button class="icon-btn" id="micBtn">
            🎙️
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
