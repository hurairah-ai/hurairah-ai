<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hurairah AI</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">
    <div class="sidebar">
      <div class="logo">
        ✨ Hurairah AI
      </div>
      <div class="tagline">
        Smart • Fast • Reliable
      </div>
      <div class="status">
        🟢 Online
      </div>
    </div>

    <div class="chat-area">
      <div class="chat-header">
        ✨ Hurairah AI
      </div>

      <div id="chatBox" class="chat-box"></div>

      <div class="input-area">
        <button class="icon-btn">📎</button>

        <textarea
          id="messageInput"
          placeholder="Message Hurairah AI..."
          rows="1"></textarea>

        <button class="icon-btn" id="micBtn">🎤</button>
        <button id="sendBtn">➤</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
