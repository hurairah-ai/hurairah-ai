<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hurairah AI</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7c3aed">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Hurairah AI">

<script>
  // ✅ Service worker unregister + force fresh load
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => {
      regs.forEach(reg => reg.unregister());
    });
  }
  // ❌ Force reload code hata diya gaya hai

  // 🔥 PERMANENT CACHE FIX: CSS aur JS ko dynamic unique version ke sath load karna
  const cacheBusterVersion = new Date().getTime();

  // 1. Dynamic CSS Link
  const cssLink = document.createElement('link');
  cssLink.rel = 'stylesheet';
  cssLink.href = 'style.css?v=' + cacheBusterVersion;
  document.head.appendChild(cssLink);

  // 2. Dynamic JS Script (Jo niche body ke baad load hota, use yahan se handle kiya hai)
  window.addEventListener('DOMContentLoaded', () => {
    const jsScript = document.createElement('script');
    jsScript.src = 'script.js?v=' + cacheBusterVersion;
    document.body.appendChild(jsScript);
  });
</script>
</head>
<body>

<div id="nameModal" class="name-modal-overlay">
  <div class="name-modal-box">
    <div class="name-modal-glow"></div>
    <div class="name-modal-logo">
      <img src="logo.png" alt="Logo">
    </div>
    <h2>Hurairah AI</h2>
    <p>Apna naam likho shuru karne ke liye</p>
    <div class="name-input-wrap">
      <input type="text" id="nameInput" placeholder="Tumhara naam..." maxlength="30" autocomplete="off" />
    </div>
    <button id="nameSubmitBtn">
      <span>Shuru Karo</span>
      <span>→</span>
    </button>
  </div>
</div>

<div class="app">
  <div class="topbar">
    <button id="clearBtn">🗑️</button>
    <div class="brand">
      <span class="brand-icon">✨</span>
      <span>Hurairah AI</span>
    </div>
    <div class="topbar-right">
  <a href="trialroom.html" style="text-decoration:none;font-size:24px;">
    👕
  </a>
    </div>
  </div>

  <div id="chatBox" class="chat-box">
    <div class="welcome-screen">
      <div class="online-badge">🟢 Online</div>
      <div class="logo-wrap">
        <img src="logo.png" alt="Hurairah AI">
        <div class="logo-ring"></div>
      </div>
      <h1>Hello! 👋</h1>
      <h2>I'm Hurairah AI</h2>
      <p>How can I help you today?</p>
      <div class="welcome-chips">
        <span onclick="chipClick('Tumse kuch poochna tha')">💬 Baat karo</span>
        <span onclick="chipClick('Meri madad karo')">🤝 Madad lo</span>
        <span onclick="chipClick('Kuch interesting batao')">✨ Explore</span>
      </div>
    </div>
  </div>

  <div class="input-area">
    <button class="icon-btn" id="attachBtn">📎</button>
    <input type="file" id="imageInput" accept="image/*" hidden>
    <textarea id="messageInput" placeholder="Message likho..." rows="1"></textarea>
    <button id="sendBtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
        <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
      </svg>
    </button>
    <button class="icon-btn" id="micBtn">🎙️</button>
  </div>
</div>

<div id="recordingPopup" class="recording-popup">
  <span>🎤</span> Listening...
</div>

<!-- Note: Purana static script tag yahan se hata diya hai kyunki upar dynamic chal raha hai -->
</body>
</html>
