<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hurairah AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.chat-container{
width:100%;
max-width:900px;
height:100vh;
display:flex;
flex-direction:column;
background:#111827;
}

.header{
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
color:white;
background:#1f2937;
border-bottom:1px solid #333;
}

.chat-box{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:12px;
}

.message{
max-width:80%;
padding:12px;
border-radius:15px;
line-height:1.5;
word-wrap:break-word;
}

.user{
align-self:flex-end;
background:#2563eb;
color:white;
}

.bot{
align-self:flex-start;
background:#374151;
color:white;
}

.input-area{
display:flex;
padding:10px;
background:#1f2937;
}

input{
flex:1;
padding:12px;
border:none;
outline:none;
border-radius:10px;
font-size:16px;
}

button{
margin-left:10px;
padding:12px 18px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="chat-container">

<div class="header">
🤖 Hurairah AI
</div>

<div id="chatBox" class="chat-box">
<div class="message bot">
Assalamualaikum! Main Hurairah AI hoon. 😊
</div>
</div>

<div class="input-area">
<input id="messageInput" placeholder="Message likho...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

const API_URL =
"https://hurairah-ai.annu8857818.workers.dev";

async function sendMessage(){

const input=document.getElementById("messageInput");
const text=input.value.trim();

if(!text) return;

const chat=document.getElementById("chatBox");

chat.innerHTML+=`
<div class="message user">${text}</div>
`;

input.value="";

chat.scrollTop=chat.scrollHeight;

try{

const res=await fetch(API_URL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:text
})
});

const data=await res.json();

chat.innerHTML+=`
<div class="message bot">
${data.reply || "Koi response nahi mila"}
</div>
`;

chat.scrollTop=chat.scrollHeight;

}catch(err){

chat.innerHTML+=`
<div class="message bot">
Error: ${err.message}
</div>
`;

}

}

</script>

</body>
</html>
