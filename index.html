<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Hurairah AI</title><link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json"><meta name="theme-color" content="#0f172a"><link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"></head><body><div class="app"><!-- SIDEBAR -->
<aside class="sidebar">

    <div class="logo">
        ✨ Hurairah AI
    </div>

    <button id="newChatBtn" class="new-chat">
        + New Chat
    </button>

    <div class="chat-history" id="chatHistory"></div>

</aside>

<!-- MAIN -->
<main class="main">

    <!-- TOPBAR -->
    <header class="topbar">

        <div>
            <h2>Hurairah AI</h2>
            <small>Smart • Fast • Reliable</small>
        </div>

        <div class="top-actions">

            <span class="status">
                🟢 Online
            </span>

            <label class="mode-switch">

                <input type="checkbox" id="hurairahMode">

                <span class="slider"></span>

                ❤️ Hurairah Mode

            </label>

        </div>

    </header>

    <!-- CHAT AREA -->
    <section class="chat-box" id="chatBox">

        <div class="welcome-card">

            <h1>👋 Assalamualaikum</h1>

            <p>
                Main Hurairah AI hoon.
                Hinglish, Hindi aur English mein
                aapki help kar sakta hoon.
            </p>

        </div>

    </section>

    <!-- TYPING -->
    <div class="typing" id="typingIndicator">

        <span></span>
        <span></span>
        <span></span>

        Hurairah AI is thinking...

    </div>

    <!-- IMAGE PREVIEW -->
    <div id="imagePreviewContainer" class="image-preview-container">

        <img id="imagePreview">

        <button id="removeImage">
            ✖
        </button>

    </div>

    <!-- INPUT -->
    <footer class="input-area">

        <div class="input-wrapper">

            <input
                type="file"
                id="imageInput"
                accept="image/*"
                hidden
            >

            <button
                class="icon-btn upload"
                id="uploadBtn"
                title="Upload Image"
            >
                📷
            </button>

            <textarea
                id="userInput"
                placeholder="Message Hurairah AI..."
                rows="1"
            ></textarea>

            <button
                class="icon-btn mic"
                id="micBtn"
                title="Voice Input"
            >
                🎤
            </button>

            <button
                class="icon-btn send"
                id="sendBtn"
                title="Send"
            >
                ➤
            </button>

        </div>

    </footer>

</main>

</div><script src="script.js"></script></body>
</html>
