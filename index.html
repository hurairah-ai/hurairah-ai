<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hurairah AI</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7c3aed">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Hurairah AI">

<script>
  // ✅ Service worker unregister + clean refresh force load
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => {
      regs.forEach(reg => reg.unregister());
    });
  }

  // ⚡ Permanent Cache Fix: Unique timestamp token generation
  const cacheBusterVersion = new Date().getTime();

  // 1. Link style.css with anti-cache node
  const cssLink = document.createElement('link');
  cssLink.rel = 'stylesheet';
  cssLink.href = 'style.css?v=' + cacheBusterVersion;
  document.head.appendChild(cssLink);

  // 2. Link script.js with anti-cache node
  window.addEventListener('DOMContentLoaded', () => {
    const jsScript = document.createElement('script');
    jsScript.src = 'script.js?v=' + cacheBusterVersion;
    document.body.appendChild(jsScript);
  });
</script>
</head>
<body>

<div id="voiceOverlay" class="voice-overlay" style="display: none; position: fixed; inset: 0; background: radial-gradient(circle at center, #130a2a 0%, #05020d 100%); z-index: 99999; flex-direction: column; align-items: center; justify-content: space-between; padding: 50px 20px; font-family: sans-serif; color: white;">
  <div style="text-align: center; margin-top: 30px;">
    <h2 style="font-size: 22px; color: #a78bfa; letter-spacing: 0.5px;">Hurairah Voice Room</h2>
    <div id="voiceStatusText" style="font-size: 16px; color: #ff85a2; margin-top: 8px; font-weight: 600; text-shadow: 0 0 10px rgba(255,64,129,0.4);">Connecting...</div>
  </div>

  <div class="voice-wave-container" style="display: flex; align-items: center; justify-content: center; gap: 8px; height: 100px;">
    <style>
      .w-bar { width: 5px; height: 18px; background: linear-gradient(to top, #7c3aed, #ff4081); border-radius: 3px; animation: vCalm 1.2s infinite ease-in-out; }
      .w-bar.v-streaming { animation: vActive 0.5s infinite alternate ease-in-out !important; }
      .w-bar:nth-child(2) { animation-delay: 0.15s; } .w-bar:nth-child(3) { animation-delay: 0.3s; }
      .w-bar:nth-child(4) { animation-delay: 0.45s; } .w-bar:nth-child(5) { animation-delay: 0.6s; }
      @keyframes vCalm { 0%, 100% { height: 14px; } 50% { height: 32px; } }
      @keyframes vActive { 0% { height: 15px; } 100% { height: 85px; } }
    </style>
    <div class="w-bar"></div> <div class="w-bar"></div> <div class="w-bar"></div> <div class="w-bar"></div> <div class="w-bar"></div>
  </div>

  <button id="closeVoiceBtn" style="background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255,255,255,0.15); color: white; padding: 12px 36px; border-radius: 30px; font-size: 15px; cursor: pointer; transition: background 0.2s;">End Call 📞</button>
</div>

<div id="nameModal" class="name-modal-overlay">
  <div class="name-modal-box">
    <div class="name-modal-glow"></div>
    <div class="name-modal-logo">
      <img src="logo.png" alt="Logo">
    </div>
    <h2>Hurairah AI</h2>
    <p>Apna naam likho shuru karne ke liye</p>
    <div class="name-input-wrap">
      <input type="text" id="nameInput" placeholder="Tumhara naam..." maxlength="30" autocomplete="off" />
    </div>
    <button id="nameSubmitBtn">
      <span>Shuru Karo</span>
      <span>→</span>
    </button>
  </div>
</div>

<div class="app">
  <div class="topbar">
    <button id="clearBtn">🗑️</button>
    <div class="brand">
      <span class="brand-icon">✨</span>
      <span>Hurairah AI</span>
    </div>
    <div class="topbar-right">
      <a href="trialroom.html" style="text-decoration:none;font-size:24px;">👕</a>
    </div>
  </div>

  <div id="chatBox" class="chat-box">
    <div class="welcome-screen">
      <div class="online-badge">🟢 Online</div>
      <div class="logo-wrap">
        <img src="logo.png" alt="Hurairah AI">
        <div class="logo-ring"></div>
      </div>
      <h1>Hello! 👋</h1>
      <h2>I'm Hurairah AI</h2>
      <p>How can I help you today?</p>
      <div class="welcome-chips">
        <span onclick="chipClick('Tumse kuch poochna tha')">💬 Baat karo</span>
        <span onclick="chipClick('Meri madad karo')">🤝 Madad lo</span>
        <span onclick="chipClick('Kuch interesting batao')">✨ Explore</span>
      </div>
    </div>
  </div>

  <div id="imagePreview" style="display: none;">
    <div class="preview-inner">
      <img src="" id="previewImgSrc" alt="Attachment Thumbnail">
      <button type="button" class="preview-remove" id="cancelImgPreviewBtn">✕</button>
    </div>
    <div class="preview-name" id="previewImgName" style="margin-left: 10px;">Selected image...</div>
  </div>

  <div class="input-area">
    <button class="icon-btn" id="attachBtn" type="button">📎</button>
    <input type="file" id="imageInput" accept="image/*" hidden>
    
    <textarea id="messageInput" placeholder="Message likho..." rows="1"></textarea>
    
    <button id="sendBtn" type="button">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
        <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
      </svg>
    </button>
    
    <button class="icon-btn" id="micBtn" type="button">🎙️</button>
    <button class="icon-btn" id="headphoneBtn" type="button">🎧</button>
  </div>
</div>

<div id="recordingPopup" class="recording-popup">
  <span>🎤</span> Listening...
</div>

<script>
  function chipClick(val) {
    const textInput = document.getElementById("messageInput");
    if(textInput) {
      textInput.value = val;
      const dispatchBtn = document.getElementById("sendBtn");
      if (dispatchBtn) dispatchBtn.click();
    }
  }
</script>
</body>
</html>
